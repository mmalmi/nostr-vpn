name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/nostr-vpn-gui/pnpm-lock.yaml

      - name: Build frontend
        run: |
          pnpm --dir crates/nostr-vpn-gui install --frozen-lockfile
          pnpm --dir crates/nostr-vpn-gui build

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --exclude nostr-vpn-gui --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --exclude nostr-vpn-gui

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            gui: false
          - os: macos-14
            target: aarch64-apple-darwin
            gui: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            gui: true

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Setup pnpm
        if: matrix.gui
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        if: matrix.gui
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/nostr-vpn-gui/pnpm-lock.yaml

      - name: Build GUI frontend assets
        if: matrix.gui
        run: |
          pnpm --dir crates/nostr-vpn-gui install --frozen-lockfile
          pnpm --dir crates/nostr-vpn-gui build

      - name: Build core CLI + relay
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p nostr-vpn-core \
            -p nostr-vpn-cli \
            -p nostr-vpn-relay

      - name: Build GUI
        if: matrix.gui
        run: cargo build --release --target ${{ matrix.target }} -p nostr-vpn-gui
